services:
  pythia-landing:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - KLAVIYO_PUBLIC_API_KEY=${KLAVIYO_PUBLIC_API_KEY}
      - KLAVIYO_PUBLIC_PROFILES_URL=${KLAVIYO_PUBLIC_PROFILES_URL}
      - KLAVIYO_PRIVATE_API_KEY=${KLAVIYO_PRIVATE_API_KEY}
      - KLAVIYO_LIST_ID=${KLAVIYO_LIST_ID}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ALLOWED_ORIGIN=${ALLOWED_ORIGIN}
    restart: unless-stopped

networks:
  default:
    name: pythia-network 